<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picatto | Gomitas enchiladas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #fff8ef;
      color: #201713;
      letter-spacing: 0;
    }

    .hero {
      min-height: 72vh;
      background:
        linear-gradient(90deg, rgba(32, 23, 19, 0.78), rgba(32, 23, 19, 0.22)),
        url("https://i.imgur.com/FixhvoL.jpeg");
      background-size: cover;
      background-position: center;
    }

    .card {
      border: 1px solid #eadfd3;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 44px rgba(64, 38, 26, 0.08);
      overflow: hidden;
    }

    .product-media {
      height: 390px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center 0%;
      display: block;
    }

    .image-viewer {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.84);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: 20px;
    }

    .image-viewer img {
      max-width: min(96vw, 1300px);
      max-height: 92vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-30 border-b border-orange-100 bg-white/92 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 md:px-6">
      <a href="index.html" class="flex items-center gap-3">
        <img src="./assets/brand/logo.png" alt="Picatto" class="h-11 w-11 rounded-lg object-cover">
        <span>
          <span class="block text-xl font-black uppercase leading-5 text-red-700">Picatto</span>
          <span class="block text-xs font-black uppercase text-slate-500">Gomitas enchiladas</span>
        </span>
      </a>
      <a id="top-whatsapp" class="rounded-lg bg-green-600 px-4 py-2 text-sm font-black text-white" target="_blank" rel="noopener">
        <i class="fa-brands fa-whatsapp mr-2"></i>Pedir
      </a>
    </div>
  </header>

  <main>
    <section class="hero flex items-end">
      <div class="mx-auto w-full max-w-6xl px-4 pb-10 pt-20 text-white md:px-6 md:pb-16">
        <p class="mb-3 text-sm font-black uppercase text-orange-200">Hechas en Guatemala</p>
        <h1 class="max-w-3xl text-4xl font-black leading-tight md:text-6xl">Picatto</h1>
        <p class="mt-4 max-w-2xl text-lg font-bold leading-8 text-orange-50">Escoge tu producto y enviamos tu pedido directo por WhatsApp.</p>
        <a href="#productos" class="mt-6 inline-flex items-center gap-2 rounded-lg bg-red-700 px-5 py-3 text-sm font-black text-white shadow-xl shadow-red-900/20">
          <i class="fa-solid fa-basket-shopping"></i> Ver productos
        </a>
      </div>
    </section>

    <section id="productos" class="mx-auto max-w-6xl px-4 py-10 md:px-6 md:py-14">
      <div class="mb-6 flex flex-col gap-2 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-sm font-black uppercase text-red-700">Menu publico</p>
          <h2 class="text-3xl font-black text-slate-950">Elige y envia por WhatsApp</h2>
        </div>
        <p id="cart-total" class="text-xl font-black text-red-700">Total: Q0.00</p>
      </div>

      <div id="product-grid" class="grid gap-5 md:grid-cols-2"></div>

      <aside class="card mt-6 p-4 md:p-5">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <h3 class="text-xl font-black">Tu pedido</h3>
            <div id="cart-lines" class="mt-2 text-sm font-bold leading-6 text-slate-600">Aun no has elegido productos.</div>
          </div>
          <div class="flex flex-wrap gap-2">
            <button onclick="clearCart()" class="rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-black text-slate-700">
              <i class="fa-solid fa-trash-can mr-2"></i>Limpiar
            </button>
            <button onclick="sendOrderToWhatsApp()" class="rounded-lg bg-green-600 px-5 py-3 text-sm font-black text-white">
              <i class="fa-brands fa-whatsapp mr-2"></i>Enviar pedido
            </button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <footer class="border-t border-orange-100 bg-white px-4 py-6 text-center text-xs font-bold uppercase text-slate-500">
    Picatto | Pedidos por WhatsApp
  </footer>

  <div id="toast" class="fixed bottom-5 left-1/2 z-50 hidden -translate-x-1/2 rounded-lg bg-slate-950 px-5 py-3 text-sm font-black text-white"></div>
  <div id="image-viewer" class="image-viewer" onclick="closeImageViewer()">
    <img id="image-viewer-img" alt="Vista completa del producto">
  </div>

  <script>
    const WHATSAPP_NUMBER = "50244099902";
    const products = [
      {
        id: "picatto",
        name: "PICATTO",
        description: "Presentacion normal.",
        price: 15,
        image: "./assets/products/picatto.png"
      },
      {
        id: "piccaxtreme",
        name: "PICAXTTREME",
        description: "Presentacion extrema.",
        price: 18,
        image: "./assets/products/piccaxttreme.png"
      }
    ];

    let cart = [];

    function money(value) {
      return "Q" + Number(value || 0).toFixed(2);
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.remove("hidden");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.add("hidden"), 2400);
    }

    function addToCart(productId) {
      const product = products.find(item => item.id === productId);
      const qty = Math.max(1, Number(document.getElementById("qty-" + productId).value || 1));
      const existing = cart.find(item => item.id === productId);
      if (existing) existing.quantity += qty;
      else cart.push({ ...product, quantity: qty });
      document.getElementById("qty-" + productId).value = 1;
      renderCart();
      showToast("Agregado al pedido.");
    }

    function updateQty(productId, change) {
      const item = cart.find(entry => entry.id === productId);
      if (!item) return;
      item.quantity += change;
      if (item.quantity <= 0) cart = cart.filter(entry => entry.id !== productId);
      renderCart();
    }

    function clearCart() {
      cart = [];
      renderCart();
    }

    function total() {
      return cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    }

    function buildMessage() {
      const lines = [
        "Hola Picatto, quiero este pedido:",
        ...cart.map(item => item.quantity + " x " + item.name),
        "Total: " + money(total())
      ];
      return lines.join("\n");
    }

    function whatsappUrl(message) {
      return "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(message);
    }

    function sendOrderToWhatsApp() {
      if (cart.length === 0) {
        showToast("Elige al menos un producto.");
        return;
      }
      window.open(whatsappUrl(buildMessage()), "_blank", "noopener");
    }

    function renderProducts() {
      document.getElementById("product-grid").innerHTML = products.map(product => `
        <article class="card mx-auto w-full max-w-[460px]">
          <div class="product-media cursor-zoom-in" onclick="openImageViewer('${product.image}', '${product.name}')">
            <img src="${product.image}" alt="${product.name}">
          </div>
          <div class="p-5">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h3 class="text-2xl font-black text-slate-950">${product.name}</h3>
                <p class="mt-2 min-h-[48px] text-sm font-bold leading-6 text-slate-600">${product.description}</p>
              </div>
              <p class="text-2xl font-black text-red-700">${money(product.price)}</p>
            </div>
            <div class="mt-5 flex items-center justify-between gap-3">
              <input id="qty-${product.id}" type="number" min="1" value="1" class="h-11 w-20 rounded-lg border border-slate-200 text-center font-black outline-none focus:border-red-500">
              <button onclick="addToCart('${product.id}')" class="flex items-center gap-2 rounded-lg bg-slate-950 px-4 py-3 text-sm font-black text-white">
                <i class="fa-solid fa-plus"></i> Agregar
              </button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function openImageViewer(src, alt) {
      const viewer = document.getElementById("image-viewer");
      const img = document.getElementById("image-viewer-img");
      img.src = src;
      img.alt = alt || "Producto";
      viewer.style.display = "flex";
    }

    function closeImageViewer() {
      const viewer = document.getElementById("image-viewer");
      const img = document.getElementById("image-viewer-img");
      viewer.style.display = "none";
      img.src = "";
    }

    function renderCart() {
      document.getElementById("cart-total").textContent = "Total: " + money(total());
      const topWhatsApp = document.getElementById("top-whatsapp");
      topWhatsApp.href = whatsappUrl(cart.length ? buildMessage() : "Hola Picatto, quiero hacer un pedido.");

      if (cart.length === 0) {
        document.getElementById("cart-lines").textContent = "Aun no has elegido productos.";
        return;
      }

      document.getElementById("cart-lines").innerHTML = cart.map(item => `
        <div class="mb-2 flex items-center justify-between gap-3 rounded-lg bg-slate-50 p-3">
          <span>${item.quantity} x ${item.name} - ${money(item.price * item.quantity)}</span>
          <span class="flex items-center gap-2">
            <button class="icon-button h-8 w-8 bg-white text-slate-700" onclick="updateQty('${item.id}', -1)" aria-label="Quitar"><i class="fa-solid fa-minus"></i></button>
            <button class="icon-button h-8 w-8 bg-white text-slate-700" onclick="updateQty('${item.id}', 1)" aria-label="Agregar"><i class="fa-solid fa-plus"></i></button>
          </span>
        </div>
      `).join("");
    }

    renderProducts();
    renderCart();
  </script>
</body>
</html>
